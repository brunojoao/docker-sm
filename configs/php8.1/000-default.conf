<VirtualHost *:5555>
        ServerName 172.20.0.8
        DocumentRoot /var/www/html/
        <Directory /var/www/html/>
                Options Indexes FollowSymLinks
                AllowOverride All
                Require all granted
        </Directory>
</VirtualHost>

<VirtualHost *:5555>
        ServerAdmin webmaster@localhost
        ServerName aldoimoveis.docker.local
        DocumentRoot /var/www/html/aldoimoveis/web
        <Directory /var/www/html/aldoimoveis/web/>
                Options Indexes FollowSymLinks
                AllowOverride All
                Require all granted
        </Directory>
        ErrorLog ${APACHE_LOG_DIR}/error.log
        CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
